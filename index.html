<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
</head>
<body>
    <h1>Add book to library!</h1>

    <form id="bookDetails">
        <label for="title">Title</label>
        <input type="text" name="title" id="title"><br><br>

        <label for="author">Author of the book</label>
        <input type="text" name="author" id="author"><br><br>

        <label for="pages">Number of pages</label>
        <input type="number" name="pages" id="pages"><br><br>

        <label for="bookDescription">Description of the book</label><br>
        <textarea name="bookDescription" id="bookDescription" rows="4" cols="50"></textarea><br><br>

        <select name="status">
            <option value="Read">Read</option>
            <option value="Not Read">Not Read</option>
        </select>

        <button type="submit">Add</button>
    </form>

    <div id="display-books"></div>
    <script src="./script.js"></script>
</body>
</html>
