<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Library</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" height="50px" viewBox="0 -960 960 960" width="50px" fill="currentColor">
                    <path d="M480-60q-72-68-165-104t-195-36v-440q101 0 194 36.5T480-498q73-69 166-105.5T840-640v440q-103 0-195.5 36T480-60Zm0-104q63-47 134-75t146-37v-276q-73 13-143.5 52.5T480-394q-66-66-136.5-105.5T200-552v276q75 9 146 37t134 75ZM367-647q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 
                    47-113 47t-113-47Zm169.5-56.5Q560-727 560-760t-23.5-56.5Q513-840 480-840t-56.5 23.5Q400-793 400-760t23.5 56.5Q447-680 480-680t56.5-23.5ZM480-760Zm0 366Z"/>
                </svg>
                <h1>Personal<span>Lib</span></h1>
            </div>
        </header>

        <section class="sidebar-form">
            <h1>Add a new book to your list</h1>

            <form class="bookDetails">
                <div class="field">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" placeholder="eg. Atomic Habits">
                </div>

                <div class="field">
                    <label for="author">Author of the book</label>
                    <input type="text" name="author" id="author" placeholder="eg. James Clear">
                </div>

                <div class="field">
                    <label for="pages">Number of pages</label>
                    <input type="number" name="pages" id="pages" placeholder="eg. 320">
                </div>

                <div class="field">
                    <label for="bookDescription">Description of the book</label>
                    <textarea name="bookDescription" id="bookDescription" rows="4" cols="50" placeholder="Write a short description about the book or note for yourself..."></textarea>
                </div>

                <div class="field">
                    <label for="status">Status</label>
                    <select name="status">
                        <option value="Read">Read</option>
                        <option value="Not Read">Not Read</option>
                    </select>
                    <div>

                <button type="submit">Add</button>
            </form>
        </section>

        <main class="cardsBook">
            <div class="display-books"></div>
        </main>
    </div>
    <script src="./script.js"></script>
</body>
</html>
